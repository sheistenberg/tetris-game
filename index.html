<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tetris</h1>
    <div id="game-container">
        <canvas id="game-canvas" width="240" height="400"></canvas>
        <div id="sidebar">
            <div>Score: <span id="score">0</span></div>
            <div>Lines: <span id="lines">0</span></div>
            <div>Level: <span id="level">1</span></div>
            <div>Next Piece:</div>
            <canvas id="preview-canvas" width="60" height="60"></canvas>
            <div>Hold Piece:</div>
            <canvas id="hold-canvas" width="60" height="60"></canvas>
            <button id="start-btn">Start</button>
            <button id="pause-btn">Pause</button>
            <button id="music-btn">Music: On</button>
            <select id="theme-select">
                <option value="classic">Classic</option>
                <option value="dark">Dark</option>
                <option value="neon">Neon</option>
            </select>
        </div>
        <div id="touch-controls">
            <button id="left-btn">←</button>
            <button id="right-btn">→</button>
            <button id="down-btn">↓</button>
            <button id="rotate-btn">↑</button>
        </div>
    </div>
    <div id="game-over" class="overlay">
        <h2>Game Over</h2>
        <p>Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Restart</button>
    </div>
    <div id="pause-overlay" class="overlay">
        <h2>Paused</h2>
        <button id="resume-btn">Resume</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
